<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Viewers - Tiempo Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1::before {
            content: "🎥";
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .stats-container {
            display: none;
            background: #f8f9ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stats-container.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .viewers-count {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-live {
            background: #10b981;
            color: white;
        }

        .status-offline {
            background: #ef4444;
            color: white;
        }

        .status-loading {
            background: #f59e0b;
            color: white;
        }

        .update-log {
            background: #f3f4f6;
            border-radius: 10px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            margin-top: 20px;
        }

        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid #d1d5db;
            color: #374151;
            animation: slideInLeft 0.3s ease-out;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .timestamp {
            color: #9ca3af;
            font-size: 11px;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border-left: 4px solid #dc2626;
        }

        .error-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .button-stop {
            background: #ef4444;
            margin-top: 10px;
        }

        .button-stop:hover {
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4);
        }

        .info-box {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            color: #1e40af;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Viewers en Tiempo Real</h1>
        <p class="subtitle">Monitorea viewers de TikTok Live en tiempo real</p>

        <div class="info-box">
            💡 Ingresa el nombre de usuario (sin @) y las actualizaciones se mostrarán cada 5 segundos
        </div>

        <div class="input-group">
            <input 
                type="text" 
                id="username" 
                placeholder="ej: officialgeilegisela"
                value="officialgeilegisela"
            >
            <button onclick="startStreaming()">Conectar</button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="stats-container" id="statsContainer">
            <div class="stat-row">
                <span class="stat-label">Usuario:</span>
                <span class="stat-value" id="usernameDisplay">-</span>
            </div>

            <div class="viewers-count" id="viewersCount">0</div>

            <div class="stat-row">
                <span class="stat-label">Estado:</span>
                <span id="statusBadge" class="status-badge status-loading">Conectando...</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">Última actualización:</span>
                <span class="stat-value" id="lastUpdate" style="font-size: 14px;">-</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">Total de updates:</span>
                <span class="stat-value" id="updateCount" style="font-size: 16px;">0</span>
            </div>

            <div class="update-log" id="updateLog"></div>

            <button class="button-stop" onclick="stopStreaming()">Desconectar</button>
        </div>
    </div>

    <script>
        let eventSource = null;
        let updateCounter = 0;
        const MAX_LOG_ENTRIES = 10;

        function startStreaming() {
            const username = document.getElementById('username').value.trim();

            if (!username) {
                showError('Por favor ingresa un nombre de usuario');
                return;
            }

            // Limpiar conexión anterior si existe
            if (eventSource) {
                eventSource.close();
            }

            updateCounter = 0;
            clearUpdateLog();
            showStats();

            document.getElementById('usernameDisplay').textContent = username;
            document.getElementById('statusBadge').textContent = 'Conectando...';
            document.getElementById('statusBadge').className = 'status-badge status-loading';
            hideError();

            // Conectar a Server-Sent Events
            const url = `/tiktok/live?username=${encodeURIComponent(username)}`;
            eventSource = new EventSource(url);

            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updateViewer(data);
                } catch (error) {
                    console.error('Error parsing message:', error);
                }
            };

            eventSource.onerror = (error) => {
                console.error('EventSource error:', error);
                document.getElementById('statusBadge').textContent = 'Desconectado';
                document.getElementById('statusBadge').className = 'status-badge status-offline';
                if (eventSource) {
                    eventSource.close();
                }
            };

            addLog(`✅ Conectando a ${username}...`);
        }

        function updateViewer(data) {
            updateCounter++;

            if (data.type === 'error') {
                document.getElementById('statusBadge').textContent = 'Error';
                document.getElementById('statusBadge').className = 'status-badge status-offline';
                addLog(`❌ Error: ${data.error}`);
                return;
            }

            // Actualizar conteo de viewers
            document.getElementById('viewersCount').textContent = data.viewerCount.toLocaleString();

            // Actualizar estado
            const statusBadge = document.getElementById('statusBadge');
            if (data.isLive) {
                statusBadge.textContent = '🔴 EN VIVO';
                statusBadge.className = 'status-badge status-live';
            } else {
                statusBadge.textContent = 'OFFLINE';
                statusBadge.className = 'status-badge status-offline';
            }

            // Actualizar última actualización
            const timestamp = new Date(data.timestamp);
            document.getElementById('lastUpdate').textContent = timestamp.toLocaleTimeString();

            // Actualizar contador
            document.getElementById('updateCount').textContent = updateCounter;

            // Agregar log
            const change = data.updateNumber > 1 ? '+' : '';
            addLog(`📊 ${data.viewerCount.toLocaleString()} viewers - ${timestamp.toLocaleTimeString()}`);
        }

        function stopStreaming() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                document.getElementById('statusBadge').textContent = 'Desconectado';
                document.getElementById('statusBadge').className = 'status-badge status-offline';
                addLog('🔌 Desconectado del stream');
            }
        }

        function showStats() {
            document.getElementById('statsContainer').classList.add('active');
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }

        function addLog(message) {
            const logDiv = document.getElementById('updateLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="timestamp">[${time}]</span> ${message}`;

            logDiv.appendChild(entry);

            // Mantener solo las últimas N entradas
            while (logDiv.children.length > MAX_LOG_ENTRIES) {
                logDiv.removeChild(logDiv.firstChild);
            }

            // Scroll al final
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearUpdateLog() {
            document.getElementById('updateLog').innerHTML = '';
        }

        // Permitir Enter para conectar
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startStreaming();
            }
        });

        // Desconectar al cerrar la página
        window.addEventListener('beforeunload', () => {
            if (eventSource) {
                eventSource.close();
            }
        });
    </script>
</body>
</html>
